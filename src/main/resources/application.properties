spring.application.name=sshop

server.port=5050

# Database configuration - REQUIRED: Set DB environment variables
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/sshop_db?allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${DB_USERNAME:your_db_username}
spring.datasource.password=${DB_PASSWORD:your_db_password}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
##(create, update, create-drop, validate)
spring.jpa.hibernate.ddl-auto=update

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

api.prefix=/api/v1

# JWT Configuration - REQUIRED: Set JWT_SECRET environment variable
sshop.app.jwtSecret=${JWT_SECRET:PLEASE_SET_JWT_SECRET_ENV_VAR}
sshop.app.jwtExpirationMs=${JWT_EXPIRATION:3600000}

# Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html