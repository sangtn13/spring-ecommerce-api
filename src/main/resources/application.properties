spring.application.name=sshop

server.port=5050

# Database configuration - Override with environment variables
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/sshop_db?allowPublicKeyRetrieval=true&useSSL=false}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:admin}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
##(create, update, create-drop, validate)
spring.jpa.hibernate.ddl-auto=update

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

api.prefix=/api/v1

# JWT Configuration - Use environment variables for security
sshop.app.jwtSecret=${JWT_SECRET:dGhpc2lzYXZlcnlzZWN1cmVzZWNyZXRrZXlmb3Jqd3R0b2tlbmdlbmVyYXRpb25hbmRzaG91bGRiZWF0bGVhc3QyNTZiaXRzbG9uZw==}
sshop.app.jwtExpirationMs=${JWT_EXPIRATION:3600000}

# Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html