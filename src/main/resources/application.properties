spring.application.name=sshop

server.port=5050

# Database configuration - REQUIRED: Set DB environment variables
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

##(create, update, create-drop, validate)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_batch_fetch_size=100

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

api.prefix=/api/v1

# JWT Configuration - REQUIRED: Set JWT_SECRET environment variable
sshop.app.jwtSecret=${JWT_SECRET}
sshop.app.jwtExpirationMs=${JWT_EXPIRATION}

# Swagger Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html