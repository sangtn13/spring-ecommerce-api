version: '3.8'

services:
  # 1. Database for your Spring Boot application
  mysql:
    image: 'mysql:8.0'
    container_name: 'mysql_container'
    environment:
      - 'MYSQL_DATABASE=${MYSQL_DATABASE}'
      - 'MYSQL_PASSWORD=${MYSQL_PASSWORD}'
      - 'MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}'
      - 'MYSQL_USER=${MYSQL_USER}'
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network
    restart: always

  # 2. Database for SonarQube
  sonarqube-db:
    image: postgres:15-alpine
    container_name: sonarqube-postgres
    environment:
      POSTGRES_USER: ${SONARQUBE_POSTGRES_USER}
      POSTGRES_PASSWORD: ${SONARQUBE_POSTGRES_PASSWORD}
      POSTGRES_DB: ${SONARQUBE_POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - sonarqube_postgres_data:/var/lib/postgresql/data
    networks:
      - sonar-network
    restart: unless-stopped

  # 3. Server SonarQube
  sonarqube:
    image: sonarqube:10.3-community
    container_name: sonarqube-server
    depends_on:
      - sonarqube-db
    environment:
      - SONAR_JDBC_URL=jdbc:postgresql://sonarqube-db:5432/${SONARQUBE_POSTGRES_DB}
      - SONAR_JDBC_USERNAME=${SONARQUBE_POSTGRES_USER}
      - SONAR_JDBC_PASSWORD=${SONARQUBE_POSTGRES_PASSWORD}
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    ports:
      - "9000:9000"
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    networks:
      - sonar-network
    restart: unless-stopped
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536

# Manage data storage volumes (data is not lost when containers are stopped)
volumes:
  mysql_data:
  sonarqube_postgres_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:

# Analysis and SonarQube services are on separate networks
networks:
  app-network:
    driver: bridge
  sonar-network:
    driver: bridge